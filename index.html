<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training & Placement Cell | NIT Puducherry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              luna: {
                50: '#A7EBF2',   // Bright Icy Blue
                100: '#A7EBF2',  // Light Blue alias
                300: '#54ACBF',  // Glowing Teal/Blue
                400: '#54ACBF',  // Glowing Teal/Blue alias
                600: '#26658C',  // Accent Blue
                800: '#023859',  // Dark Blue / Secondary
                950: '#011C40',  // Deepest Dark / Background
              }
            },
            fontFamily: {
              sans: ['Poppins', 'Inter', 'sans-serif'], // Bold sans‑serif for headings
              serif: ['Playfair Display', 'Georgia', 'serif'], // Clean serif for body
            },
            animation: {
              'float-slow': 'floatSlow 12s ease-in-out infinite',
              'float-medium': 'floatMedium 8s ease-in-out infinite',
              'aurora-glow-1': 'auroraGlow1 15s ease-in-out infinite alternate',
              'aurora-glow-2': 'auroraGlow2 18s ease-in-out infinite alternate',
              'marquee': 'marquee 30s linear infinite',
              'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
            },
            keyframes: {
              floatSlow: {
                '0%, 100%': { transform: 'translateY(0px) translateX(0px) rotate(0deg)' },
                '50%': { transform: 'translateY(-20px) translateX(10px) rotate(180deg)' },
              },
              floatMedium: {
                '0%, 100%': { transform: 'translateY(0px) translateX(0px) scale(1)' },
                '50%': { transform: 'translateY(-15px) translateX(-10px) scale(1.08)' },
              },
              auroraGlow1: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '50%': { transform: 'translate(50px, 80px) scale(1.2)' },
                '100%': { transform: 'translate(-30px, 30px) scale(0.9)' },
              },
              auroraGlow2: {
                '0%': { transform: 'translate(0px, 0px) scale(1.1)' },
                '50%': { transform: 'translate(-60px, -40px) scale(0.8)' },
                '100%': { transform: 'translate(40px, 50px) scale(1.3)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              pulseGlow: {
                '0%, 100%': { boxShadow: '0 0 15px rgba(84, 172, 191, 0.2)' },
                '50%': { boxShadow: '0 0 30px rgba(84, 172, 191, 0.5)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Ensure Typography rules: Headings are Bold sans-serif, Body is clean serif */
      h1, h2, h3, h4, h5, h6, .font-heading {
        font-family: 'Poppins', 'Inter', sans-serif !important;
        font-weight: 700;
      }
      body {
        font-family: 'Playfair Display', 'Georgia', serif;
      }
      
      /* Hide standard scrollbars */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Custom scrollbar for main window if needed */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #011C40;
      }
      ::-webkit-scrollbar-thumb {
        background: #26658C;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #54ACBF;
      }

      /* Glassmorphism Utilities */
      .glass-panel {
        background: rgba(1, 28, 64, 0.45);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(84, 172, 191, 0.15);
      }
      .light .glass-panel {
        background: rgba(167, 235, 242, 0.3);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(38, 101, 140, 0.2);
      }

      /* Heavy Frosted Glassmorphism for Modals */
      .glass-modal {
        background: rgba(1, 28, 64, 0.7);
        backdrop-filter: blur(35px);
        -webkit-backdrop-filter: blur(35px);
        border: 1px solid rgba(167, 235, 242, 0.25);
      }
      .light .glass-modal {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(35px);
        -webkit-backdrop-filter: blur(35px);
        border: 1px solid rgba(84, 172, 191, 0.4);
      }

      /* Scroll-Triggered Animations helper classes */
      .fade-in-on-scroll {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      }
      .fade-in-on-scroll.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Infinite banner scroller layout */
      .marquee-container {
        display: flex;
        overflow: hidden;
        user-select: none;
      }
      .marquee-content {
        display: flex;
        gap: 4rem;
        flex-shrink: 0;
        min-width: 100%;
        justify-content: space-around;
      }

      /* Morphing colorful liquid blob animation (Vertex simulation via SVG) */
      @keyframes liquidDrift {
        0%, 100% {
          transform: translateY(0px) rotate(0deg) scale(1);
        }
        50% {
          transform: translateY(-16px) rotate(6deg) scale(1.03);
        }
      }
      .animate-liquid-drift {
        animation: liquidDrift 10s ease-in-out infinite alternate;
        will-change: transform;
      }

      /* Inner Glow: radial-gradient(circle at center, #54ACBF 0%, transparent 70%) */
      .bg-inner-glow {
        background: radial-gradient(circle at center, #54ACBF 0%, transparent 70%);
      }

      /* Outer Glow: drop-shadow pulsing between rgba(84,172,191,0.3) -> rgba(167,235,242,0.6) */
      @keyframes glowPulse {
        0%, 100% {
          filter: drop-shadow(0 0 35px rgba(84, 172, 191, 0.35));
        }
        50% {
          filter: drop-shadow(0 0 50px rgba(167, 235, 242, 0.65));
        }
      }
      .filter-outer-glow {
        animation: glowPulse 6s ease-in-out infinite;
      }
      .vision-section {
        min-height: auto !important;
        margin-top: 2rem !important;
        margin-bottom: 2rem !important;
      }
      .mandates-section {
        min-height: auto !important;
        margin-top: 1.5rem !important;
        padding-top: 1.5rem !important;
        margin-bottom: 1.5rem !important;
      }
      /* Custom Glass Header */
      .glass-header {
        background: rgba(255, 255, 255, 0.02) !important;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
      }
      .light .glass-header {
        background: rgba(255, 255, 255, 0.2) !important;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(84, 172, 191, 0.08) !important;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.01);
      }
    </style>
  </head>
  <body class="bg-luna-950 text-slate-100 dark:bg-luna-950 dark:text-slate-100 transition-colors duration-500 overflow-x-hidden relative min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
